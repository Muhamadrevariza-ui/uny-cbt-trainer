openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: UNY CBT Trainer API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: ai
    description: AI-powered features via Gemini
  - name: progress
    description: Anonymous device-scoped exam formats, tryout sets, attempts and progress
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /ai/analyze:
    post:
      operationId: analyzeExam
      tags: [ai]
      summary: Analyze exam results and return AI-powered recommendations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeInput"
      responses:
        "200":
          description: AI analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: AI service error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ai/explain:
    post:
      operationId: explainQuestion
      tags: [ai]
      summary: Get a deep AI explanation for a question
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExplainInput"
      responses:
        "200":
          description: Detailed explanation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExplainResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: AI service error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ai/generate-questions:
    post:
      operationId: generateQuestions
      tags: [ai]
      summary: Generate new practice questions using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateQuestionsInput"
      responses:
        "200":
          description: Generated questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateQuestionsResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: AI service error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /exam-formats:
    get:
      operationId: listExamFormats
      tags: [progress]
      summary: List configured exam formats (data-driven exam structure)
      responses:
        "200":
          description: List of exam formats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExamFormat"

  /tryout-sets:
    get:
      operationId: listTryoutSets
      tags: [progress]
      summary: List tryout sets with this device's progress on each
      parameters:
        - $ref: "#/components/parameters/AnonIdHeader"
      responses:
        "200":
          description: List of tryout sets with progress
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TryoutSet"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tryout-sets/{code}/items:
    get:
      operationId: getTryoutSetItems
      tags: [progress]
      summary: Get the fixed question composition for a tryout set
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tryout set items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TryoutSetItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /attempts:
    get:
      operationId: listAttempts
      tags: [progress]
      summary: List this device's completed exam attempts (history)
      parameters:
        - $ref: "#/components/parameters/AnonIdHeader"
      responses:
        "200":
          description: List of attempts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Attempt"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createAttempt
      tags: [progress]
      summary: Save a completed exam attempt and update the wrong-answer bank
      parameters:
        - $ref: "#/components/parameters/AnonIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttemptInput"
      responses:
        "200":
          description: Saved attempt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attempt"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /attempts/{id}:
    get:
      operationId: getAttempt
      tags: [progress]
      summary: Get a single attempt by id
      parameters:
        - $ref: "#/components/parameters/AnonIdHeader"
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Attempt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attempt"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /wrong-answers:
    get:
      operationId: listWrongAnswers
      tags: [progress]
      summary: List this device's wrong-answer bank (for Review mode)
      parameters:
        - $ref: "#/components/parameters/AnonIdHeader"
      responses:
        "200":
          description: List of wrong answers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WrongAnswer"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  parameters:
    AnonIdHeader:
      name: X-Anon-Id
      in: header
      required: true
      description: Anonymous device id (UUID), generated and persisted client-side
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SectionResult:
      type: object
      properties:
        section:
          type: string
        total:
          type: integer
        correct:
          type: integer
        incorrect:
          type: integer
        unanswered:
          type: integer
        accuracy:
          type: number
        subskills:
          type: array
          items:
            $ref: "#/components/schemas/SubskillResult"
      required:
        - section
        - total
        - correct
        - incorrect
        - unanswered
        - accuracy
        - subskills

    SubskillResult:
      type: object
      properties:
        name:
          type: string
        attempts:
          type: integer
        correct:
          type: integer
      required:
        - name
        - attempts
        - correct

    AnalyzeInput:
      type: object
      properties:
        totalQuestions:
          type: integer
        correct:
          type: integer
        incorrect:
          type: integer
        unanswered:
          type: integer
        score:
          type: number
        accuracy:
          type: number
        sections:
          type: array
          items:
            $ref: "#/components/schemas/SectionResult"
        historyCount:
          type: integer
          description: Total number of past exam sessions
      required:
        - totalQuestions
        - correct
        - incorrect
        - unanswered
        - score
        - accuracy
        - sections
        - historyCount

    AnalysisResult:
      type: object
      properties:
        summary:
          type: string
          description: Short overall performance summary
        strengths:
          type: array
          items:
            type: string
          description: Areas where the student performs well
        weaknesses:
          type: array
          items:
            type: string
          description: Areas that need improvement
        recommendations:
          type: array
          items:
            type: string
          description: Specific actionable study tips
        readinessLevel:
          type: string
          description: Estimated UNY readiness level (e.g. Siap, Perlu Latihan Lebih, Belum Siap)
        motivationalMessage:
          type: string
          description: A motivational message for the student
      required:
        - summary
        - strengths
        - weaknesses
        - recommendations
        - readinessLevel
        - motivationalMessage

    ExplainInput:
      type: object
      properties:
        section:
          type: string
        subskill:
          type: string
        question:
          type: string
        passage:
          type: ["string", "null"]
        options:
          type: array
          items:
            type: string
        correctAnswer:
          type: integer
        userAnswer:
          type: ["integer", "null"]
        basicExplanation:
          type: string
      required:
        - section
        - subskill
        - question
        - options
        - correctAnswer
        - basicExplanation

    ExplainResult:
      type: object
      properties:
        detailedExplanation:
          type: string
          description: Step-by-step detailed explanation in Bahasa Indonesia
        concept:
          type: string
          description: The underlying concept or skill being tested
        tipForNext:
          type: string
          description: A tip for similar questions in the future
      required:
        - detailedExplanation
        - concept
        - tipForNext

    GenerateQuestionsInput:
      type: object
      properties:
        section:
          type: string
          description: "Section ID: tpa, lit_id, lit_en, or mtk"
        subskill:
          type: string
          description: Specific subskill to generate questions for
        difficulty:
          type: string
          description: "Difficulty: mudah, sedang, or sulit"
        count:
          type: integer
          description: Number of questions to generate (max 10)
          default: 5
      required:
        - section
        - subskill
        - difficulty

    GeneratedQuestion:
      type: object
      properties:
        question:
          type: string
        passage:
          type: ["string", "null"]
        options:
          type: array
          items:
            type: string
        correctAnswer:
          type: integer
        explanation:
          type: string
        estimatedTime:
          type: integer
      required:
        - question
        - options
        - correctAnswer
        - explanation
        - estimatedTime

    GenerateQuestionsResult:
      type: object
      properties:
        questions:
          type: array
          items:
            $ref: "#/components/schemas/GeneratedQuestion"
        section:
          type: string
        subskill:
          type: string
        difficulty:
          type: string
      required:
        - questions
        - section
        - subskill
        - difficulty

    Question:
      type: object
      properties:
        id:
          type: string
        section:
          type: string
        subskill:
          type: string
        difficulty:
          type: string
        sourceType:
          type: string
        question:
          type: string
        passage:
          type: ["string", "null"]
        options:
          type: array
          items:
            type: string
        correctAnswer:
          type: integer
        explanation:
          type: string
        estimatedTime:
          type: integer
      required:
        - id
        - section
        - subskill
        - difficulty
        - sourceType
        - question
        - options
        - correctAnswer
        - explanation
        - estimatedTime

    QuestionResult:
      type: object
      properties:
        question:
          $ref: "#/components/schemas/Question"
        userAnswer:
          type: ["integer", "null"]
        isCorrect:
          type: boolean
        doubtful:
          type: boolean
        timeSpent:
          type: number
      required:
        - question
        - userAnswer
        - isCorrect
        - doubtful
        - timeSpent

    SectionStat:
      type: object
      properties:
        total:
          type: integer
        correct:
          type: integer
        incorrect:
          type: integer
        unanswered:
          type: integer
        accuracy:
          type: number
        avgTime:
          type: number
      required:
        - total
        - correct
        - incorrect
        - unanswered
        - accuracy
        - avgTime

    AttemptInput:
      type: object
      properties:
        id:
          type: string
          description: Client-generated attempt id (e.g. "exam-<timestamp>")
        mode:
          type: string
          description: "mini | full | materi | review | tryout"
        tryoutSetCode:
          type: ["string", "null"]
          description: Set when mode is "tryout" — links the attempt to a tryout set
        title:
          type: string
        totalQuestions:
          type: integer
        correct:
          type: integer
        incorrect:
          type: integer
        unanswered:
          type: integer
        score:
          type: integer
        accuracy:
          type: integer
        timeUsedSec:
          type: integer
        durationSec:
          type: integer
        sections:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/SectionStat"
        questions:
          type: array
          items:
            $ref: "#/components/schemas/QuestionResult"
      required:
        - id
        - mode
        - title
        - totalQuestions
        - correct
        - incorrect
        - unanswered
        - score
        - accuracy
        - timeUsedSec
        - durationSec
        - sections
        - questions

    Attempt:
      type: object
      properties:
        id:
          type: string
        mode:
          type: string
        tryoutSetCode:
          type: ["string", "null"]
        title:
          type: string
        totalQuestions:
          type: integer
        correct:
          type: integer
        incorrect:
          type: integer
        unanswered:
          type: integer
        score:
          type: integer
        accuracy:
          type: integer
        timeUsedSec:
          type: integer
        durationSec:
          type: integer
        sections:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/SectionStat"
        questions:
          type: array
          items:
            $ref: "#/components/schemas/QuestionResult"
        completedAt:
          type: string
          format: date-time
      required:
        - id
        - mode
        - title
        - totalQuestions
        - correct
        - incorrect
        - unanswered
        - score
        - accuracy
        - timeUsedSec
        - durationSec
        - sections
        - questions
        - completedAt

    ExamFormatSection:
      type: object
      properties:
        sectionId:
          type: string
        questionCount:
          type: integer
        durationSeconds:
          type: integer
        order:
          type: integer
      required:
        - sectionId
        - questionCount
        - durationSeconds
        - order

    ExamFormat:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        label:
          type: string
        description:
          type: ["string", "null"]
        sections:
          type: array
          items:
            $ref: "#/components/schemas/ExamFormatSection"
        totalQuestions:
          type: integer
        totalDurationSeconds:
          type: integer
        sourceNotes:
          type: ["string", "null"]
        status:
          type: string
      required:
        - id
        - code
        - label
        - sections
        - totalQuestions
        - totalDurationSeconds
        - status

    TryoutSetProgress:
      type: object
      properties:
        status:
          type: string
          description: "belum | sedang | selesai"
        bestScore:
          type: ["integer", "null"]
        attemptsCount:
          type: integer
        lastAttemptId:
          type: ["string", "null"]
        lastCompletedAt:
          type: ["string", "null"]
          format: date-time
      required:
        - status
        - bestScore
        - attemptsCount
        - lastAttemptId
        - lastCompletedAt

    TryoutSet:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        label:
          type: string
        description:
          type: ["string", "null"]
        examFormat:
          $ref: "#/components/schemas/ExamFormat"
        progress:
          $ref: "#/components/schemas/TryoutSetProgress"
      required:
        - id
        - code
        - label
        - examFormat
        - progress

    TryoutSetItem:
      type: object
      properties:
        questionId:
          type: string
        sectionId:
          type: string
        subskill:
          type: string
        difficulty:
          type: string
        orderIndex:
          type: integer
      required:
        - questionId
        - sectionId
        - subskill
        - difficulty
        - orderIndex

    WrongAnswer:
      type: object
      properties:
        questionId:
          type: string
        timesMissed:
          type: integer
        lastMissedAt:
          type: string
          format: date-time
      required:
        - questionId
        - timesMissed
        - lastMissedAt
